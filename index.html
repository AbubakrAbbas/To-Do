<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>TO-DO Website</title>
  </head>
  <body>
    <main>
      <nav>
        <div class="left"><h1>ToDo.</h1></div>
        <div class="right"><button id="add-btn">+ Add new Task</button></div>
      </nav>
      <section class="board">
        <div id="todo" class="task-coloumn">
          <div class="heading">
            <div class="left">ToDo</div>
            <div class="right">0</div>
          </div>
        </div>
        <div id="progress" class="task-coloumn">
          <div class="heading">
            <div class="left">In Progress</div>
            <div class="right">0</div>
          </div>
        </div>
        <div id="completed" class="task-coloumn">
          <div class="heading">
            <div class="left">Completed</div>
            <div class="right">0</div>
          </div>
        </div>
      </section>
    </main>

    <!-- add-task menu -->
    <div class="add-menu">
      <div class="bg"></div>
      <div class="centre">
        <input id="inp-title" type="text" placeholder="Task title…" />
        <textarea
          id="descp"
          name="Description"
          placeholder="Add a description…"
        ></textarea>
        <button id="add">Add Task</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
